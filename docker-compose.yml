version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transactions_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d transactions_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://admin:password@db:5432/transactions_db
      LOG_LEVEL: INFO
    volumes:
      - ./apps/api/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      LOG_LEVEL: info
    volumes:
      - ./apps/web/logs:/app/logs
    depends_on:
      - backend

volumes:
  pgdata:
