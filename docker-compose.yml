version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16  # Pre-packaged with the extension
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transactions_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d transactions_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
