version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16  # Pre-packaged with the extension
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transactions_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
